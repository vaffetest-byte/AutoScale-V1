<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGradient" x1="50" y1="50" x2="350" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EE7F7"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagon Border -->
  <path d="M200 40L338.56 120V280L200 360L61.44 280V120L200 40Z" stroke="url(#hexGradient)" stroke-width="24" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Inner Content Background -->
  <path d="M200 60L318.56 130V270L200 340L81.44 270V130L200 60Z" fill="#0A0A0A" />

  <!-- Vertical Bars -->
  <rect x="130" y="220" width="25" height="60" rx="4" fill="#3B82F6" fill-opacity="0.6" />
  <rect x="170" y="190" width="25" height="90" rx="4" fill="#3B82F6" fill-opacity="0.8" />
  <rect x="210" y="160" width="25" height="120" rx="4" fill="#60A5FA" />
  <rect x="250" y="200" width="25" height="80" rx="4" fill="#3B82F6" fill-opacity="0.7" />

  <!-- Line Graph with Nodes -->
  <path d="M110 240L150 200L190 220L230 160L270 180" stroke="#6EE7F7" stroke-width="4" stroke-linecap="round" />
  <circle cx="110" cy="240" r="6" fill="#6EE7F7" />
  <circle cx="150" cy="200" r="6" fill="#6EE7F7" />
  <circle cx="190" cy="220" r="6" fill="#6EE7F7" />
  <circle cx="230" cy="160" r="6" fill="#6EE7F7" />
  <circle cx="270" cy="180" r="6" fill="#6EE7F7" />

  <!-- Large Upward Arrow -->
  <path d="M100 280L200 180L300 130L350 80" stroke="#6EE7F7" stroke-width="20" stroke-linecap="round" filter="url(#glow)" />
  <path d="M310 80H350V120" stroke="#6EE7F7" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
